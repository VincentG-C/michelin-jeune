version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: michelin_pulse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: michelin2026
      POSTGRES_DB: michelin_pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d michelin_pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: michelin_pulse_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:michelin2026@postgres:5432/michelin_pulse
      NUXT_SECRET: ${NUXT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      MAPBOX_PUBLIC_TOKEN: ${MAPBOX_PUBLIC_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
